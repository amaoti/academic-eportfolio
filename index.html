<!-- POPUP GALLERY -->

<!-- FULLSCREEN IMAGE -->
<div id="largeView" onclick="closeLarge()">
  <span id="largeViewClose">×</span>
  <img id="largeViewImg">
</div>


<style>

/* PREVIEW SECTION – STABLE BLOCK ABOVE TABLE */
.preview-section {
  width: 100%;
  padding-left: 40px;
  margin-top: 28px;
  margin-bottom: 15px;
}

.preview-header {
  display: flex;
  align-items: center;
  gap: 25px;
}

/* NEW BUTTON TEXT */
.preview-button {
  padding: 12px 26px;
  background: #cc0033;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  white-space: nowrap;
}

/* COLLAGE NEXT TO BUTTON (left aligned) */
.preview-collage {
  display: grid;
  grid-template-columns: repeat(2, 95px);
  grid-template-rows: repeat(2, 95px);
  gap: 8px;
}

.preview-collage img {
  width: 95px;
  height: 95px;
  object-fit: cover;
  border-radius: 6px;
}


/* POPUP GALLERY */
.gallery-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  z-index: 2000;
}

.gallery-content {
  max-width: 950px;
  margin: 50px auto;
  background: #181f28;
  padding: 30px;
  border-radius: 10px;
}

.close-btn {
  font-size: 32px;
  cursor: pointer;
  color: white;
  float: right;
}

.gallery-grid {
  margin-top: 10px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 18px;
}

.gallery-grid img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
}


/* FULLSCREEN IMAGE */
#largeView {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(6px);
  z-index: 3000;
}

#largeView img {
  display: block;
  max-width: 92%;
  max-height: 92%;
  margin: 3% auto;
  border-radius: 12px;
}

#largeViewClose {
  position: fixed;
  top: 20px;
  right: 30px;
  font-size: 40px;
  color: white;
  cursor: pointer;
}

</style>


<script>
function openGallery() {
  document.getElementById("galleryModal").style.display = "block";
}

function closeGallery() {
  document.getElementById("galleryModal").style.display = "none";
}

/* CLICK OUTSIDE to close */
function closeOnOutside(e) {
  document.getElementById("galleryModal").style.display = "none";
}

/* ENLARGE IMAGE */
function enlarge(src) {
  document.getElementById("largeViewImg").src = src;
  document.getElementById("largeView").style.display = "block";
}

/* CLOSE FULLSCREEN */
function closeLarge() {
  document.getElementById("largeView").style.display = "none";
}
</script>
